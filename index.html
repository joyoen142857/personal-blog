<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>赵娟的博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;

        h1 { color: #2c3e50; margin-bottom: 10px; }

        .post {
            margin-bottom: 30px;
            padding: 20px;
            background: #fafafa;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }
        .post h2 { color: #2c3e50; margin-bottom: 15px; }
        .post-date { color: #95a5a6; font-size: 0.85em; margin-bottom: 10px; }
        .post-content { color: #555; white-space: pre-line; }
        footer {

            padding-top: 30px;
